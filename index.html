<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥩 Meat Tray</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Special+Elite&family=Caveat:wght@400;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sepia-dark: #2c1a0e; --sepia-mid: #6b3f1e; --sepia-warm: #a0622a;
    --sepia-light: #d4956a; --sepia-pale: #f0d5b0; --sepia-cream: #faf0dc;
    --polaroid-white: #fefef8; --red-pen: #cc1a1a; --red-pen-light: #e63030; --accent-gold: #c8921a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--sepia-dark);
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23a0622a' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
      radial-gradient(ellipse at 20% 50%, #3d1f0a 0%, #1a0d05 100%);
    min-height: 100vh; font-family: 'Special Elite', serif; color: var(--sepia-dark); overflow-x: hidden;
  }
  .app-header { text-align: center; padding: 24px 16px 8px; }
  .app-title { font-family: 'Permanent Marker', cursive; font-size: clamp(2.2rem,8vw,3.5rem); color: var(--sepia-pale); text-shadow: 3px 3px 0px var(--sepia-dark), 5px 5px 12px rgba(0,0,0,0.6); letter-spacing: 2px; line-height: 1; }
  .app-subtitle { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--sepia-light); margin-top: 4px; letter-spacing: 1px; }
  .nav-tabs { display: flex; justify-content: center; gap: 8px; padding: 12px 16px; }
  .nav-tab { font-family: 'Permanent Marker', cursive; font-size: 0.85rem; padding: 8px 18px; border: 2px solid var(--sepia-warm); background: transparent; color: var(--sepia-light); cursor: pointer; border-radius: 4px; transition: all 0.2s; letter-spacing: 1px; }
  .nav-tab.active, .nav-tab:hover { background: var(--sepia-warm); color: var(--sepia-cream); transform: rotate(-1deg); }
  .page { display: none; } .page.active { display: block; }

  .recipes-page { padding: 0 16px 40px; max-width: 480px; margin: 0 auto; }
  .recipe-counter { text-align: center; font-family: 'Caveat', cursive; color: var(--sepia-light); font-size: 1rem; margin-bottom: 8px; }
  .polaroid-wrapper { position: relative; margin: 0 auto; max-width: 420px; }
  .polaroid { background: var(--polaroid-white); padding: 12px 12px 52px; box-shadow: 0 4px 6px rgba(0,0,0,0.3), 0 10px 30px rgba(0,0,0,0.5); transform: rotate(-1deg); cursor: grab; user-select: none; border-radius: 2px; position: relative; }
  .polaroid:active { cursor: grabbing; }
  .polaroid::before { content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%) rotate(-2deg); width: 70px; height: 22px; background: rgba(240,213,176,0.55); border: 1px solid rgba(200,160,80,0.3); border-radius: 2px; z-index: 10; }
  .photo-container { width: 100%; aspect-ratio: 4/3; overflow: hidden; position: relative; }
  .photo-container svg { width: 100%; height: 100%; display: block; }
  .photo-container::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.25) 100%); pointer-events: none; z-index: 2; }
  /* done state */
  .strike-overlay { display: none; position: absolute; top: 12px; left: 12px; right: 12px; bottom: 52px; z-index: 19; pointer-events: none; }
  .polaroid.recipe-done .strike-overlay { display: block; }
  .done-stamp { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(-12deg); font-family: 'Permanent Marker', cursive; font-size: clamp(1.4rem,6vw,2rem); color: var(--red-pen); border: 4px solid var(--red-pen); padding: 6px 14px; border-radius: 6px; background: rgba(255,255,255,0.1); white-space: nowrap; letter-spacing: 3px; z-index: 20; pointer-events: none; }
  .polaroid.recipe-done .done-stamp { display: block; }
  .polaroid.recipe-done .photo-container { filter: saturate(0.2) brightness(0.7); }
  .polaroid.recipe-done .polaroid-caption::after { content: ''; position: absolute; left: 5%; right: 5%; top: 50%; height: 3px; background: var(--red-pen); transform: translateY(-50%) rotate(-1.5deg); border-radius: 2px; }
  .effort-badge { position: absolute; top: 16px; right: 16px; background: var(--sepia-dark); color: var(--sepia-pale); font-family: 'Caveat', cursive; font-size: 0.8rem; padding: 3px 8px; border-radius: 3px; transform: rotate(3deg); z-index: 5; }
  .polaroid-caption { text-align: center; font-family: 'Permanent Marker', cursive; font-size: 1.4rem; color: var(--sepia-dark); padding-top: 10px; letter-spacing: 1px; position: relative; z-index: 1; }
  .polaroid-meta { text-align: center; font-family: 'Caveat', cursive; font-size: 0.95rem; color: var(--sepia-warm); margin-top: 2px; z-index: 1; position: relative; }
  .polaroid.swipe-left { animation: swipeLeft 0.38s ease forwards; }
  .polaroid.swipe-right { animation: swipeRight 0.38s ease forwards; }
  .polaroid.enter-from-right { animation: enterFromRight 0.38s ease forwards; }
  .polaroid.enter-from-left { animation: enterFromLeft 0.38s ease forwards; }
  @keyframes swipeLeft { to { transform: translateX(-120%) rotate(-15deg); opacity:0; } }
  @keyframes swipeRight { to { transform: translateX(120%) rotate(15deg); opacity:0; } }
  @keyframes enterFromRight { from { transform: translateX(120%) rotate(15deg); opacity:0; } to { transform: rotate(-1deg); opacity:1; } }
  @keyframes enterFromLeft { from { transform: translateX(-120%) rotate(-15deg); opacity:0; } to { transform: rotate(-1deg); opacity:1; } }
  .swipe-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
  .swipe-btn { font-size: 1.5rem; width: 52px; height: 52px; border-radius: 50%; border: 3px solid var(--sepia-warm); background: var(--sepia-dark); color: var(--sepia-pale); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .swipe-btn:hover { background: var(--sepia-warm); transform: scale(1.1); }
  .swipe-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .recipe-dots { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: center; max-width: 210px; }
  .recipe-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sepia-mid); transition: all 0.2s; cursor: pointer; flex-shrink: 0; }
  .recipe-dot.active { background: var(--sepia-light); transform: scale(1.4); }
  .recipe-dot.done-dot { background: var(--red-pen); opacity: 0.75; }
  .scroll-hint { text-align: center; font-family: 'Caveat', cursive; color: var(--sepia-mid); font-size: 0.85rem; margin-top: 8px; }
  .done-notice { display: none; font-family: 'Permanent Marker', cursive; font-size: 1rem; color: var(--red-pen); text-align: center; margin: 10px 0; border: 2px dashed var(--red-pen); padding: 6px 12px; border-radius: 4px; background: rgba(44,26,14,0.6); letter-spacing: 1px; }
  .done-notice.show { display: block; }
  .recipe-details { max-width: 420px; margin: 20px auto 0; }
  .recipe-details.is-done { opacity: 0.45; pointer-events: none; }
  .recipe-section { background: rgba(250,240,220,0.08); border: 1px solid rgba(160,98,42,0.3); border-radius: 4px; padding: 14px 16px; margin-bottom: 12px; }
  .recipe-section-title { font-family: 'Permanent Marker', cursive; font-size: 1.1rem; color: var(--sepia-light); border-bottom: 1px dashed var(--sepia-mid); padding-bottom: 6px; margin-bottom: 10px; letter-spacing: 1px; }
  .ingredient-list { list-style: none; padding: 0; }
  .ingredient-list li { font-family: 'Courier Prime', monospace; font-size: 0.9rem; color: var(--sepia-cream); padding: 3px 0; border-bottom: 1px dotted rgba(160,98,42,0.2); display: flex; gap: 8px; }
  .ingredient-list li::before { content: '▸'; color: var(--sepia-warm); flex-shrink: 0; }
  .method-steps { list-style: none; counter-reset: steps; padding: 0; }
  .method-steps li { counter-increment: steps; font-family: 'Special Elite', serif; font-size: 0.88rem; color: var(--sepia-cream); padding: 6px 0 6px 32px; border-bottom: 1px dotted rgba(160,98,42,0.2); position: relative; line-height: 1.5; }
  .method-steps li::before { content: counter(steps); position: absolute; left: 0; top: 6px; background: var(--sepia-warm); color: var(--sepia-dark); width: 20px; height: 20px; border-radius: 50%; font-family: 'Permanent Marker', cursive; font-size: 0.75rem; line-height: 20px; text-align: center; display: block; }

  /* TRACKER */
  .tracker-page { padding: 16px; max-width: 480px; margin: 0 auto; }
  .tracker-title { font-family: 'Permanent Marker', cursive; font-size: 1.8rem; color: var(--sepia-pale); text-align: center; margin-bottom: 4px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
  .tracker-subtitle { font-family: 'Caveat', cursive; color: var(--sepia-light); text-align: center; font-size: 1rem; margin-bottom: 20px; }
  .notebook { background: #faf0dc; border-radius: 4px; padding: 16px 16px 24px 52px; position: relative; box-shadow: 3px 3px 8px rgba(0,0,0,0.4); min-height: 300px; }
  .notebook::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 40px; background: #e8d4a8; border-right: 2px solid #c8a870; border-radius: 4px 0 0 4px; }
  .notebook::after { content: ''; position: absolute; left: 48px; top: 0; bottom: 0; width: 1px; background: rgba(200,80,80,0.35); }
  .notebook-lines { position: absolute; left: 48px; right: 0; top: 0; bottom: 0; background-image: repeating-linear-gradient(transparent,transparent 27px,rgba(160,140,100,0.25) 27px,rgba(160,140,100,0.25) 28px); border-radius: 0 4px 4px 0; pointer-events: none; }
  .spiral-holes { position: absolute; left: 0; top: 0; bottom: 0; width: 40px; display: flex; flex-direction: column; justify-content: space-around; padding: 16px 0; z-index: 2; }
  .spiral-hole { width: 16px; height: 16px; background: var(--sepia-dark); border-radius: 50%; margin: 0 auto; border: 2px solid #b89a6a; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.4); }
  .meat-category { margin-bottom: 16px; position: relative; z-index: 1; }
  .meat-category-title { font-family: 'Caveat', cursive; font-size: 1.05rem; color: #5a3a1a; font-weight: 700; margin-bottom: 4px; border-bottom: 1px solid rgba(160,140,100,0.3); padding-bottom: 2px; }
  .meat-item { display: flex; align-items: center; gap: 10px; padding: 3px 0; cursor: pointer; min-height: 30px; position: relative; }
  .meat-item-text { font-family: 'Caveat', cursive; font-size: 1.15rem; color: #3a2010; flex: 1; position: relative; transition: color 0.3s; line-height: 1.3; }
  .meat-item.crossed .meat-item-text { color: #8a6040; }
  .meat-item.crossed .meat-item-text::after { content: ''; position: absolute; left: -4px; right: -4px; top: 50%; height: 3px; background: var(--red-pen); transform: translateY(-50%) rotate(-1deg); border-radius: 1px; animation: st1 0.3s ease forwards; }
  .meat-item.crossed .meat-item-text::before { content: ''; position: absolute; left: -2px; right: -3px; top: calc(50% + 3px); height: 2px; background: var(--red-pen-light); transform: translateY(-50%) rotate(0.5deg); border-radius: 1px; opacity: 0.6; animation: st2 0.35s ease 0.05s forwards; }
  @keyframes st1 { from { transform: translateY(-50%) rotate(-1deg) scaleX(0); transform-origin: left center; } to { transform: translateY(-50%) rotate(-1deg) scaleX(1); } }
  @keyframes st2 { from { transform: translateY(-50%) rotate(0.5deg) scaleX(0); transform-origin: left center; } to { transform: translateY(-50%) rotate(0.5deg) scaleX(1); } }
  .meat-checkbox { width: 18px; height: 18px; border: 2px solid #8a6040; border-radius: 2px; flex-shrink: 0; transition: all 0.2s; position: relative; }
  .meat-item.crossed .meat-checkbox { background: var(--red-pen); border-color: var(--red-pen); }
  .meat-item.crossed .meat-checkbox::after { content: '✓'; position: absolute; inset: 0; display: block; color: white; font-size: 0.7rem; font-weight: bold; line-height: 14px; text-align: center; }
  .meat-qty { font-family: 'Courier Prime', monospace; font-size: 0.75rem; color: #7a5030; flex-shrink: 0; background: rgba(160,98,42,0.1); padding: 1px 5px; border-radius: 2px; }
  .meat-recipes-hint { font-family: 'Caveat', cursive; font-size: 0.78rem; color: #9a6030; padding-left: 28px; margin-bottom: 6px; font-style: italic; }
  .progress-section { margin-top: 20px; text-align: center; }
  .progress-bar-wrap { background: rgba(160,98,42,0.2); border: 1px solid var(--sepia-mid); border-radius: 4px; height: 16px; overflow: hidden; margin: 8px 0; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--sepia-warm), var(--accent-gold)); transition: width 0.5s ease; border-radius: 4px; }
  .progress-label { font-family: 'Caveat', cursive; color: var(--sepia-light); font-size: 1rem; }
  .celebration-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
  .celebration-overlay.show { display: flex; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .celebration-card { background: var(--polaroid-white); padding: 16px 16px 56px; max-width: 320px; width: 90%; text-align: center; transform: rotate(-2deg); box-shadow: 0 20px 60px rgba(0,0,0,0.6); animation: celebPop 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
  @keyframes celebPop { from { transform: rotate(-2deg) scale(0.5); opacity:0; } to { transform: rotate(-2deg) scale(1); opacity:1; } }
  .celebration-emoji { font-size: 4rem; display: block; margin-bottom: 8px; }
  .celebration-title { font-family: 'Permanent Marker', cursive; font-size: 1.6rem; color: var(--sepia-dark); line-height: 1.2; margin-bottom: 8px; }
  .celebration-sub { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--sepia-warm); }
  .celebration-close { margin-top: 20px; font-family: 'Permanent Marker', cursive; background: var(--sepia-dark); color: var(--sepia-cream); border: none; padding: 10px 24px; font-size: 1rem; cursor: pointer; border-radius: 3px; letter-spacing: 1px; }
  .confetti-piece { position: fixed; animation: confettiFall linear forwards; z-index: 1001; }
  @keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity:1; } 100% { transform: translateY(110vh) rotate(720deg); opacity:0; } }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">🥩 Meat Tray</div>
  <div class="app-subtitle">the $20 raffle that keeps on giving</div>
</div>
<div class="nav-tabs">
  <button class="nav-tab active" onclick="showPage('recipes',this)">📸 Recipes</button>
  <button class="nav-tab" onclick="showPage('tracker',this)">📋 Meat Remaining</button>
</div>

<div id="page-recipes" class="page active recipes-page">
  <div class="recipe-counter" id="recipeCounter"></div>
  <div class="polaroid-wrapper">
    <div class="polaroid" id="polaroidCard"
         ontouchstart="touchStart(event)" ontouchend="touchEnd(event)"
         onmousedown="mouseStart(event)" onmouseup="mouseEnd(event)">
      <div class="effort-badge" id="effortBadge"></div>
      <div class="photo-container" id="photoContainer"></div>
      <div class="strike-overlay">
        <svg width="100%" height="100%" viewBox="0 0 100 75" preserveAspectRatio="none">
          <line x1="2" y1="2" x2="98" y2="73" stroke="#cc1a1a" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
          <line x1="98" y1="2" x2="2" y2="73" stroke="#cc1a1a" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
        </svg>
      </div>
      <div class="done-stamp">ALL GONE</div>
      <div class="polaroid-caption" id="recipeTitle"></div>
      <div class="polaroid-meta" id="recipeMeta"></div>
    </div>
  </div>
  <div class="scroll-hint">← swipe or use buttons →</div>
  <div class="swipe-controls">
    <button class="swipe-btn" id="prevBtn" onclick="navigate(-1)">◀</button>
    <div class="recipe-dots" id="recipeDots"></div>
    <button class="swipe-btn" id="nextBtn" onclick="navigate(1)">▶</button>
  </div>
  <div class="done-notice" id="doneNotice">🥩 Meat all used up — this one's done!</div>
  <div class="recipe-details" id="recipeDetails"></div>
</div>

<div id="page-tracker" class="page tracker-page">
  <div class="tracker-title">🗒️ Meat Remaining</div>
  <div class="tracker-subtitle">tap to cross off · recipes auto-update</div>
  <div class="notebook">
    <div class="notebook-lines"></div>
    <div class="spiral-holes" id="spiralHoles"></div>
    <div id="meatList"></div>
  </div>
  <div class="progress-section">
    <div class="progress-label" id="progressLabel"></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</div>

<div class="celebration-overlay" id="celebrationOverlay">
  <div class="celebration-card">
    <span class="celebration-emoji">🏆</span>
    <div class="celebration-title">You are a meat gobbler pro!</div>
    <div class="celebration-sub">Every last sausage. Every last chop. Legendary effort. 🥩👑</div>
    <button class="celebration-close" onclick="closeCelebration()">CHAMPION!</button>
  </div>
</div>

<script>
const MEAT = { SAUSAGES:'sausages', CHICKEN:'chicken', SCOTCH:'scotch', BLADE:'blade', PORK:'pork' };

// SVG illustrations — realistic food scenes, full colour, no cartoons
const SVGS = {
  bbq_snags: `<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1008"/><stop offset="100%" style="stop-color:#2d1a08"/></linearGradient>
    <linearGradient id="grill1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#444"/><stop offset="100%" style="stop-color:#222"/></linearGradient>
    <linearGradient id="sau1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#c97040"/><stop offset="40%" style="stop-color:#a04820"/><stop offset="100%" style="stop-color:#7a2e08"/></linearGradient>
    <linearGradient id="sau2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#d08050"/><stop offset="100%" style="stop-color:#903020"/></linearGradient></defs>
    <rect width="400" height="300" fill="url(#bg1)"/>
    <!-- grill grates -->
    <rect x="40" y="120" width="320" height="120" rx="8" fill="#333" stroke="#555" stroke-width="2"/>
    <line x1="40" y1="135" x2="360" y2="135" stroke="#555" stroke-width="3"/>
    <line x1="40" y1="150" x2="360" y2="150" stroke="#555" stroke-width="3"/>
    <line x1="40" y1="165" x2="360" y2="165" stroke="#555" stroke-width="3"/>
    <line x1="40" y1="180" x2="360" y2="180" stroke="#555" stroke-width="3"/>
    <line x1="40" y1="195" x2="360" y2="195" stroke="#555" stroke-width="3"/>
    <line x1="40" y1="210" x2="360" y2="210" stroke="#555" stroke-width="3"/>
    <!-- heat glow -->
    <ellipse cx="200" cy="240" rx="140" ry="30" fill="#ff6000" opacity="0.15"/>
    <ellipse cx="200" cy="240" rx="100" ry="20" fill="#ff8000" opacity="0.12"/>
    <!-- flames -->
    <ellipse cx="100" cy="230" rx="15" ry="25" fill="#ff6600" opacity="0.6"/>
    <ellipse cx="100" cy="228" rx="8" ry="16" fill="#ffaa00" opacity="0.7"/>
    <ellipse cx="180" cy="232" rx="18" ry="28" fill="#ff5500" opacity="0.5"/>
    <ellipse cx="180" cy="229" rx="10" ry="18" fill="#ffbb00" opacity="0.65"/>
    <ellipse cx="280" cy="228" rx="14" ry="22" fill="#ff6600" opacity="0.6"/>
    <ellipse cx="280" cy="226" rx="8" ry="14" fill="#ffaa00" opacity="0.7"/>
    <!-- sausages -->
    <rect x="55" y="130" width="290" height="30" rx="15" fill="url(#sau1)"/>
    <rect x="55" y="130" width="290" height="10" rx="8" fill="#d07040" opacity="0.5"/>
    <!-- grill marks on sausage 1 -->
    <line x1="100" y1="131" x2="100" y2="159" stroke="#5a1a00" stroke-width="4" opacity="0.7"/>
    <line x1="150" y1="131" x2="150" y2="159" stroke="#5a1a00" stroke-width="4" opacity="0.7"/>
    <line x1="200" y1="131" x2="200" y2="159" stroke="#5a1a00" stroke-width="4" opacity="0.7"/>
    <line x1="250" y1="131" x2="250" y2="159" stroke="#5a1a00" stroke-width="4" opacity="0.7"/>
    <line x1="300" y1="131" x2="300" y2="159" stroke="#5a1a00" stroke-width="4" opacity="0.7"/>
    <!-- sausage 2 -->
    <rect x="55" y="168" width="290" height="30" rx="15" fill="url(#sau2)"/>
    <line x1="120" y1="169" x2="120" y2="197" stroke="#5a1a00" stroke-width="4" opacity="0.7"/>
    <line x1="175" y1="169" x2="175" y2="197" stroke="#5a1a00" stroke-width="4" opacity="0.7"/>
    <line x1="230" y1="169" x2="230" y2="197" stroke="#5a1a00" stroke-width="4" opacity="0.7"/>
    <line x1="285" y1="169" x2="285" y2="197" stroke="#5a1a00" stroke-width="4" opacity="0.7"/>

  },
  { title:"Creamy Mushroom Pork", meta:"Pork Loin Chops · Serves 4", effort:"🔶 Medium", meat:MEAT.PORK,
    ingredients:["4 pork loin chops","300g mushrooms, sliced","1 onion, diced","3 garlic cloves, minced","200ml thickened cream","100ml chicken stock","1 tsp Dijon mustard","Fresh thyme","Salt, pepper, butter"],
    method:["Season chops and sear in butter 3–4 mins per side. Remove and rest.","Cook onion 3 mins, add garlic and mushrooms, cook 5 mins.","Deglaze with stock, scraping up browned bits.","Add cream and mustard. Simmer 3–4 mins until slightly thickened.","Return chops to pan, spoon sauce over, cook 2 more mins.","Scatter fresh thyme. Serve with mash or pasta."]
  },
  { title:"Leftover Chicken Fried Rice", meta:"Leftover Chicken · Serves 3–4", effort:"⚡ Easy", meat:MEAT.CHICKEN,
    ingredients:["Leftover roast chicken, shredded","2 cups day-old cooked rice (cold!)","2 eggs","3 tbsp soy sauce","1 tbsp oyster sauce","1 tsp sesame oil","3 garlic cloves, minced","1 cup frozen peas/corn","Spring onions","Oil"],
    method:["Wok or large pan on maximum heat. Oil in.","Fry garlic 30 secs. Push to side, scramble eggs in pan.","Add cold rice — break up clumps, fry hard 3 mins.","Add chicken and veg. Keep tossing.","Splash in soy, oyster sauce, sesame oil. Toss 1 more min.","Serve topped with spring onion. Cold rice is the secret."]
  }
];

const MEAT_ITEMS = [
  { key:MEAT.SAUSAGES, label:"Sausages",        qty:"8–10 thick",  category:"🌭 Sausages" },
  { key:MEAT.CHICKEN,  label:"Whole chicken",   qty:"×1",          category:"🐔 Chicken" },
  { key:MEAT.SCOTCH,   label:"Scotch fillets",  qty:"6–8 steaks",  category:"🥩 Beef Scotch Fillets" },
  { key:MEAT.BLADE,    label:"Blade chops",     qty:"8–10 chops",  category:"🥩 Beef Blade Chops" },
  { key:MEAT.PORK,     label:"Pork loin chops", qty:"8–10 chops",  category:"🐷 Pork Loin Chops" }
];

let currentRecipe = 0;
let touchStartX = 0, mouseStartX = 0, isMouseDown = false;
let meatUsed = {};

function loadState() {
  try { const d = JSON.parse(localStorage.getItem('meatTray_v5')||'{}'); meatUsed=d.meatUsed||{}; currentRecipe=Math.min(d.currentRecipe||0,RECIPES.length-1); } catch(e){}
}
function saveState() {
  try { localStorage.setItem('meatTray_v5', JSON.stringify({meatUsed,currentRecipe})); } catch(e){}
}
function isMeatGone(k) { return !!meatUsed[k]; }
function isRecipeDone(r) { return isMeatGone(r.meat); }

function renderRecipe(animate, dir) {
  const r = RECIPES[currentRecipe];
  const done = isRecipeDone(r);
  document.getElementById('recipeCounter').textContent = `Recipe ${currentRecipe+1} of ${RECIPES.length}`;
  document.getElementById('recipeTitle').textContent = r.title;
  document.getElementById('recipeMeta').textContent = r.meta;
  document.getElementById('effortBadge').textContent = r.effort;
  const card = document.getElementById('polaroidCard');
  card.className = 'polaroid' + (done?' recipe-done':'');
  document.getElementById('photoContainer').innerHTML = SVGS[RECIPE_SVG_KEYS[currentRecipe]];
  const dots = document.getElementById('recipeDots');
  dots.innerHTML = '';
  RECIPES.forEach((rec,i)=>{
    const dot=document.createElement('div');
    dot.className='recipe-dot'+(i===currentRecipe?' active':'')+(isRecipeDone(rec)?' done-dot':'');
    dot.title=rec.title; dot.onclick=()=>goToRecipe(i); dots.appendChild(dot);
  });
  document.getElementById('prevBtn').disabled = currentRecipe===0;
  document.getElementById('nextBtn').disabled = currentRecipe===RECIPES.length-1;
  document.getElementById('doneNotice').className='done-notice'+(done?' show':'');
  const details=document.getElementById('recipeDetails');
  details.className='recipe-details'+(done?' is-done':'');
  details.innerHTML=`<div class="recipe-section"><div class="recipe-section-title">🛒 Ingredients</div><ul class="ingredient-list">${r.ingredients.map(i=>`<li>${i}</li>`).join('')}</ul></div><div class="recipe-section"><div class="recipe-section-title">👨‍🍳 Method</div><ol class="method-steps">${r.method.map(s=>`<li>${s}</li>`).join('')}</ol></div>`;
  if(animate&&dir){card.classList.add(dir==='left'?'enter-from-right':'enter-from-left');setTimeout(()=>card.classList.remove('enter-from-right','enter-from-left'),400);}
  saveState();
}

function goToRecipe(index,direction){
  if(index<0||index>=RECIPES.length)return;
  const card=document.getElementById('polaroidCard');
  const dir=direction||(index>currentRecipe?'left':'right');
  card.classList.add('swipe-'+dir);
  setTimeout(()=>{card.classList.remove('swipe-left','swipe-right');currentRecipe=index;renderRecipe(true,dir);},370);
}
function navigate(dir){goToRecipe(currentRecipe+dir,dir===1?'left':'right');}
function touchStart(e){touchStartX=e.touches[0].clientX;}
function touchEnd(e){const d=touchStartX-e.changedTouches[0].clientX;if(Math.abs(d)>50)navigate(d>0?1:-1);}
function mouseStart(e){mouseStartX=e.clientX;isMouseDown=true;}
function mouseEnd(e){if(!isMouseDown)return;isMouseDown=false;const d=mouseStartX-e.clientX;if(Math.abs(d)>60)navigate(d>0?1:-1);}

function renderTracker(){
  const holes=document.getElementById('spiralHoles'); holes.innerHTML='';
  for(let i=0;i<8;i++){const h=document.createElement('div');h.className='spiral-hole';holes.appendChild(h);}
  const list=document.getElementById('meatList'); list.innerHTML='';
  MEAT_ITEMS.forEach(item=>{
    const cat=document.createElement('div'); cat.className='meat-category';
    cat.innerHTML=`<div class="meat-category-title">${item.category}</div>`;
    const row=document.createElement('div');
    row.className='meat-item'+(isMeatGone(item.key)?' crossed':'');
    row.innerHTML=`<div class="meat-checkbox"></div><div class="meat-item-text">${item.label}</div><div class="meat-qty">${item.qty}</div>`;
    row.onclick=()=>toggleMeat(item.key,row); cat.appendChild(row);
    const hint=document.createElement('div'); hint.className='meat-recipes-hint';
    hint.textContent='→ '+RECIPES.filter(r=>r.meat===item.key).map(r=>r.title).join(', ');
    cat.appendChild(hint); list.appendChild(cat);
  });
  updateProgress();
}

function toggleMeat(key,el){
  meatUsed[key]=!meatUsed[key]; el.classList.toggle('crossed',meatUsed[key]); saveState(); updateProgress();
  if(RECIPES[currentRecipe].meat===key) renderRecipe(false);
  if(MEAT_ITEMS.every(i=>isMeatGone(i.key))) setTimeout(showCelebration,500);
}
function updateProgress(){
  const total=MEAT_ITEMS.length,done=MEAT_ITEMS.filter(i=>isMeatGone(i.key)).length;
  document.getElementById('progressLabel').textContent=`${done} of ${total} meats used up`;
  document.getElementById('progressFill').style.width=(total>0?done/total*100:0)+'%';
}
function showPage(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if(btn)btn.classList.add('active');
  if(page==='tracker')renderTracker();
  if(page==='recipes')renderRecipe(false);
}
function showCelebration(){document.getElementById('celebrationOverlay').classList.add('show');launchConfetti();}
function closeCelebration(){document.getElementById('celebrationOverlay').classList.remove('show');}
function launchConfetti(){
  const colors=['#c8921a','#cc1a1a','#a0622a','#d4956a','#f0d5b0','#8b1a1a'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=Math.random()*100+'vw';p.style.top='-20px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.borderRadius=Math.random()>0.5?'50%':'2px';
    p.style.width=(Math.random()*8+6)+'px';p.style.height=(Math.random()*8+6)+'px';
    p.style.animationDuration=(Math.random()*2+2)+'s';p.style.animationDelay=(Math.random()*2)+'s';
    document.body.appendChild(p);setTimeout(()=>p.remove(),5500);
  }
}
loadState(); renderRecipe(false); renderTracker();
</script>
</body>
</html>
